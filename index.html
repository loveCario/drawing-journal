<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学画成长记录</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-landing">

  <div class="landing-wrap">
    <div class="landing-deco">✦ &nbsp; ✦ &nbsp; ✦</div>
    <h1 class="landing-title" id="site-title">学画成长记录</h1>
    <p class="landing-tagline" id="site-tagline">记录我从 0 开始学画画的过程</p>
    <a href="gallery.html" class="landing-btn">开启你的绘画之旅</a>
    <p class="landing-note">持续更新中 ✦</p>
  </div>

  <script>
    fetch('collections.json?t=' + Date.now())
      .then(r => r.json())
      .then(data => {
        document.getElementById('site-title').textContent = data.title;
        document.getElementById('site-tagline').textContent = data.tagline;
        document.title = data.title;
      });
  </script>
</body>
</html>
