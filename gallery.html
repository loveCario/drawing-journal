<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>画廊</title>
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body class="page-gallery">

  <header class="gallery-header">
    <a href="index.html" class="header-back">← 首页</a>
    <h1 class="header-title" id="site-title"></h1>
    <div class="sort-controls">
      <button class="sort-btn active" data-sort="date">按日期</button>
      <button class="sort-btn" data-sort="custom">自定义</button>
    </div>
  </header>

  <main class="gallery-main">

    <div id="stats-bar" class="stats-bar hidden">
      <span id="stat-count"></span>
      <span class="stats-sep">·</span>
      <span id="stat-days"></span>
    </div>

    <div id="tag-filter-row" class="tag-filter-row hidden"></div>

    <div id="gallery-grid" class="gallery-grid"></div>

    <div id="empty-state" class="empty-state hidden">
      <div class="empty-icon">🎨</div>
      <h2>练习中，敬请期待~</h2>
      <p>第一幅画即将出现在这里</p>
    </div>

  </main>

  <script src="gallery.js"></script>
</body>
</html>
